name: "bGSD Security Config"
disable-default-queries: false

paths-ignore:
  - bin/**
  - node_modules/**
  - .planning/**
  - "**/*.test.js"
  - "**/*.spec.js"
  - "**/misc.js"
  - "**/phase.js"
  - "**/codebase-intel.js"
  - "**/logger.js"
  - "**/verify.js"

queries:
  - uses: security-extended
  - exclude:
      js/file-system-race
